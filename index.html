<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Orçamentos - Online Shopping</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Barra de Ações Superior -->
  <div class="topbar no-print">
    <div class="topbar-left">
      <button class="btn btn-gray" onclick="window.location.reload()">
        📄 Histórico de Orçamentos
      </button>
      <button class="btn btn-gray">
        + Novo Orçamento
      </button>
      <button class="btn btn-gray" onclick="alternarModoEscuro()" id="btn-dark-mode">
        🌙 Modo Escuro
      </button>
      <!-- NOVO: Botão Limpar Tudo -->
      <button class="btn btn-gray" style="background-color: #e53e3e; color: white;" onclick="limparOrcamento()">
        🧹 Limpar Campos
      </button>
    </div>
    <div class="topbar-right">
      <button class="btn btn-green" onclick="enviarWhatsApp()">
        💬 Enviar p/ WhatsApp
      </button>
      <button class="btn btn-blue" onclick="window.print()">
        🖨️ Imprimir / PDF
      </button>
    </div>
  </div>

  <!-- Card Principal do Orçamento -->
  <div id="tela-orcamento" class="card">
    <div class="body">
      
      <!-- Cabeçalho com o Novo Logo -->
      <div class="header">
        <div class="header-left">
          <img src="logo.png" alt="Online Shopping" class="logo-imagem" />
        </div>
        <div class="header-right">
          <span class="orc-badge" id="num-orcamento">ORC-2026-001</span>
          <div class="contact editable-contact">
            <input type="text" id="header-endereco" value="AV. João Pinheiro, 796 - Centro" placeholder="Endereço da loja" />
            <input type="text" id="header-telefone" value="Uberlândia / Uberaba ☎ (34) 3228-0115" placeholder="Telefone / Filial" />
            <input type="text" id="header-site" value="www.onlineshopping.com.br" placeholder="Site da empresa" />
          </div>
        </div>
      </div>

      <!-- Data e Local AUTOMÁTICA -->
      <div class="date-row" style="margin-top: 20px;">
        <strong>Uberlândia-MG,</strong>
        <input type="text" id="data-orcamento" value="" style="width: 210px;" />
      </div>

      <!-- Dados do Cliente -->
      <div class="client-box">
        <div class="field" style="position: relative;">
          <label>CNPJ (Digite apenas números)</label>
          <input type="text" id="cliente-cnpj" placeholder="Ex: 04388540000498" onblur="buscarCNPJ()" />
          <div id="cnpj-spinner" class="spinner" style="display: none;"></div>
        </div>
        <div class="field">
          <label>Orçamento Para</label>
          <input type="text" id="cliente-nome" placeholder="Nome do cliente / empresa" />
        </div>
        <div class="field">
          <label>Responsável pela Informação</label>
          <input type="text" id="responsavel-nome" placeholder="Nome do responsável" />
        </div>
      </div>

      <p class="intro">Conforme solicitação estamos enviando nossos melhores preços:</p>

      <!-- Tabela de Itens -->
      <table>
        <thead>
          <tr>
            <th>ITEM</th>
            <th class="center">QTD</th>
            <th class="right">VALOR UNIT.</th>
            <th>OBS. DO ITEM</th>
            <th class="right">SUB TOTAL</th>
            <th class="no-print" style="width: 80px;"></th>
          </tr>
        </thead>
        <tbody id="tabela-produtos">
          <tr>
            <td>
              <input type="text" class="prod-nome" placeholder="Descrição do produto" value="Descrição do produto" />
            </td>
            <td class="center">
              <input type="number" class="center" value="1" style="width: 50px;" oninput="calcular()" />
            </td>
            <td class="right">
              <input type="text" class="right" value="0.00" style="width: 80px;" oninput="calcular()" />
            </td>
            <td>
              <!-- MUDADO: adicionado evento oninput para monitorar o termo "sob encomenda" -->
              <input type="text" class="prod-obs" placeholder="Ex: sob encomenda..." value="Ex: sob encomenda..." oninput="calcular()" />
            </td>
            <td class="right" style="color: #2b6cb0; font-weight: 600;">R$ 0,00</td>
            <td class="center no-print">
              <div class="action-buttons">
                <button class="btn-order" onclick="moverParaCima(this)">▲</button>
                <button class="btn-order" onclick="moverParaBaixo(this)">▼</button>
                <button class="btn-remove">✕</button>
              </div>
            </td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="5" class="no-print"></td>
            <td class="gray">Subtotal</td>
            <td class="val" id="subtotal-display">R$ 0,00</td>
          </tr>
          <tr id="row-desconto" style="display:none">
            <td colspan="5" class="no-print"></td>
            <td class="gray" style="color:#276749">Desconto</td>
            <td class="val green" id="desconto-display">– R$ 0,00</td>
          </tr>
          <tr>
            <td colspan="5" class="no-print"></td>
            <td class="gray">Total</td>
            <td class="val big" id="total-display">R$ 0,00</td>
          </tr>
          <tr>
            <td colspan="5" class="no-print"></td>
            <td class="gray">Cond. Pagmt</td>
            <td class="val">
              <select id="cond-pag" onchange="calcular()">
                <option value="À vista (Dinheiro / Pix)">À vista (Dinheiro / Pix)</option>
                <option value="2x sem juros no cartão">2x sem juros no cartão</option>
                <option value="3x sem juros no cartão">3x sem juros no cartão</option>
                <option value="6x no cartão (5% acréscimo)">6x no cartão (5% acréscimo)</option>
                <option value="10x no cartão (8% acréscimo)">10x no cartão (8% acréscimo)</option>
                <option value="Boleto bancário">Boleto bancário</option>
                <option value="Outro">Outro</option>
              </select>
              <!-- NOVO: Detalhamento do parcelamento -->
              <div id="parcelas-detalhe" style="font-size: 11px; margin-top: 4px; color: #4a5568; font-weight: 600; text-align: right;"></div>
            </td>
          </tr>
          <tr>
            <td colspan="5" class="no-print"></td>
            <td class="gray">Prev. Entrega</td>
            <td class="val"><input type="text" id="prev-entrega" value="Imediato" style="text-align:right; font-weight:600;" /></td>
          </tr>
          <tr>
            <td colspan="5" class="no-print"></td>
            <td class="gray">Local de Fat. / Entrega</td>
            <td class="val"><input type="text" id="local-entrega" value="Uberlândia - MG" style="text-align:right; font-weight:600;" /></td>
          </tr>
        </tfoot>
      </table>

      <!-- Controles de Desconto -->
      <div class="desconto-row no-print">
        <label>Desconto:</label>
        <select id="tipo-desconto" onchange="calcular()">
          <option value="reais">R$ (reais)</option>
          <option value="porcento">% (porcentagem)</option>
        </select>
        <input type="number" id="valor-desconto" value="0" oninput="calcular()" />
        <span style="font-size: 11px; color: #718096;">(Máx. 20%)</span>
      </div>

      <button class="btn-add no-print" id="btn-adicionar-produto">
        + Adicionar Produto
      </button>

      <!-- Observações Gerais -->
      <div class="obs-box">
        <label class="obs-label">Observações / Condições Gerais</label>
        <textarea id="obs-gerais" placeholder="Termos do orçamento..." style="height: 180px;">• Para emissão da ordem de compra considerar nosso CNPJ 04.388.540/0004-98;
• Valor e prazo de entrega sujeito a alteração de acordo com a disponibilidade no fornecedor;
• Prazo de entrega se aplica nos itens em vermelho;
• Itens em vermelho não conseguimos devolução, pois é sob encomenda apenas pra sua compra;
• Valores apenas para faturamento no estado de Minas Gerais, demais estados sujeito à alteração;
• Valor mínimo para faturamento boleto R$ 150,00;
• Valor mínimo para entrega CIF (Grátis) em Uberlândia-MG de R$ 500,00.
• Em Casos de compra de produtos específicos com os nossos fornecedores para cumprir a demanda do cliente, de produtos cotados que não temos em nossos estoques, não aceitamos troca e nem devolução do mesmo. Favor avaliar e validar antes este orçamento com o seu departamento de TI ou áreas afins.</textarea>
      </div>

      <!-- Área Elegante de Assinatura no Rodapé -->
      <div class="signature-container">
        <div class="signature-line"></div>
        <p class="signature-title">Responsável Comercial - Online Shopping</p>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
